# Judge0 configuration
# This file is used by all services (API, Worker, PostgreSQL, Redis)

# PostgreSQL Configuration
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_secure_password
POSTGRES_DB=judge0
POSTGRES_HOST=db

# Redis Configuration
REDIS_PASSWORD=judge0_redis_secure_password
REDIS_HOST=redis

# Enable/Disable features
ENABLE_WAIT_RESULT=true
ENABLE_COMPILER_OPTIONS=true
ENABLE_COMMAND_LINE_ARGUMENTS=true
ENABLE_BATCH_FETCH=true
ENABLE_CALLBACKS=true

# Authentication
# AUTH_CALLBACK_TOKEN=your_callback_token
AUTHN_TOKEN=my_super_secure_judge0_token_123!

# Concurrency and Limits
# These control how many jobs can run at once and limits per job
MAX_QUEUE_SIZE=100
MAX_FILE_SIZE=4096

# Telemetry (Send anonymous data to authors to improve Judge0)
TELEMETRY_ENABLE=false
